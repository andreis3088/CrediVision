<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
    <title>Teste Modal Completo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #00AE9D;
            color: white;
        }
        .btn-primary:hover {
            background: #008f81;
        }
        .btn-ghost {
            background: transparent;
            color: #003641;
            border: 1px solid #e5e7eb;
        }
        .btn-ghost:hover {
            background: #f3f4f6;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-box {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-head {
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-head h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #6b7280;
            padding: 4px;
        }
        .modal-close:hover {
            color: #003641;
        }
        .modal-body {
            padding: 20px;
        }
        .modal-foot {
            padding: 20px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #003641;
        }
        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
        }
        .form-control:focus {
            outline: none;
            border-color: #00AE9D;
            box-shadow: 0 0 0 3px rgba(0,174,157,0.1);
        }
        .small {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
            display: block;
        }
        .debug {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 4px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>Teste Modal Completo - CrediVision</h1>
    
    <button class="btn btn-primary" onclick="openModal('modal-add')">
        <i class="bi bi-plus-lg"></i> Nova Aba
    </button>

    <!-- Modal: Adicionar -->
    <div class="modal-overlay" id="modal-add">
        <div class="modal-box">
            <div class="modal-head">
                <h3><i class="bi bi-plus-circle" style="color:#00AE9D;"></i> Nova Aba</h3>
                <button class="modal-close" onclick="closeModal('modal-add')"><i class="bi bi-x-lg"></i></button>
            </div>
            <form method="POST" enctype="multipart/form-data">
                <div class="modal-body">
                    <div class="form-group">
                        <label class="form-label">Nome da Aba</label>
                        <input type="text" name="name" class="form-control" placeholder="ex: Painel de Vendas" required/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Tipo de Conteúdo</label>
                        <select name="content_type" id="contentType" class="form-control" onchange="toggleContentType()">
                            <option value="url">URL (Site)</option>
                            <option value="file">Arquivo (Imagem/Vídeo)</option>
                        </select>
                    </div>
                    <div class="form-group" id="urlGroup">
                        <label class="form-label">URL</label>
                        <input type="url" name="url" id="urlInput" class="form-control" placeholder="https://..." required/>
                    </div>
                    <div class="form-group" id="fileGroup" style="display: none;">
                        <label class="form-label">Arquivo</label>
                        <input type="file" name="file" id="fileInput" class="form-control" accept="image/*,video*"/>
                        <small class="small">
                            Formatos aceitos: PNG, JPG, JPEG, GIF, MP4, AVI, MOV, WEBM (máx. 100MB)
                        </small>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Duração (segundos)</label>
                        <input type="number" name="duration" class="form-control" value="300" min="10" max="3600"/>
                        <small class="small">300s = 5 minutos</small>
                    </div>
                </div>
                <div class="modal-foot">
                    <button type="button" class="btn btn-ghost" onclick="closeModal('modal-add')">Cancelar</button>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Adicionar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="debug" id="debug">
        <strong>Debug Console:</strong><br>
        Aguardando interações...
    </div>
    
    <script>
        function log(message) {
            const debug = document.getElementById('debug');
            debug.innerHTML += '<br>' + new Date().toLocaleTimeString() + ': ' + message;
            debug.scrollTop = debug.scrollHeight;
            console.log(message);
        }

        function openModal(modalId) {
            log('Abrindo modal: ' + modalId);
            const modal = document.getElementById(modalId);
            if (modal) {
                modal.classList.add('show');
                document.body.style.overflow = 'hidden';
                log('Modal aberto com sucesso');
                
                // Garantir estado inicial
                setTimeout(() => {
                    toggleContentType();
                }, 100);
            }
        }

        function closeModal(modalId) {
            log('Fechando modal: ' + modalId);
            const modal = document.getElementById(modalId);
            if (modal) {
                modal.classList.remove('show');
                document.body.style.overflow = '';
                log('Modal fechado');
            }
        }

        function toggleContentType() {
            log('toggleContentType() chamada');
            
            const contentType = document.getElementById('contentType');
            const urlGroup = document.getElementById('urlGroup');
            const fileGroup = document.getElementById('fileGroup');
            const urlInput = document.getElementById('urlInput');
            const fileInput = document.getElementById('fileInput');
            
            if (!contentType || !urlGroup || !fileGroup) {
                log('ERRO: Elementos não encontrados');
                return;
            }
            
            log('Tipo selecionado: ' + contentType.value);
            
            if (contentType.value === 'file') {
                urlGroup.style.display = 'none';
                fileGroup.style.display = 'block';
                urlInput.removeAttribute('required');
                fileInput.setAttribute('required', 'required');
                log('Modo ARQUIVO ativado');
            } else {
                urlGroup.style.display = 'block';
                fileGroup.style.display = 'none';
                urlInput.setAttribute('required', 'required');
                fileInput.removeAttribute('required');
                log('Modo URL ativado');
            }
        }

        // Close modal on overlay click
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('modal-overlay')) {
                e.target.classList.remove('show');
                document.body.style.overflow = '';
                log('Modal fechado pelo clique no overlay');
            }
        });

        // Close modal on ESC key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const openModal = document.querySelector('.modal-overlay.show');
                if (openModal) {
                    openModal.classList.remove('show');
                    document.body.style.overflow = '';
                    log('Modal fechado pela tecla ESC');
                }
            }
        });

        // Inicialização
        document.addEventListener('DOMContentLoaded', function() {
            log('DOM carregado');
            
            // Verificar elementos
            const contentType = document.getElementById('contentType');
            const urlGroup = document.getElementById('urlGroup');
            const fileGroup = document.getElementById('fileGroup');
            
            log('Elementos encontrados:');
            log('  contentType: ' + (contentType ? 'SIM' : 'NÃO'));
            log('  urlGroup: ' + (urlGroup ? 'SIM' : 'NÃO'));
            log('  fileGroup: ' + (fileGroup ? 'SIM' : 'NÃO'));
            
            // Estado inicial
            toggleContentType();
        });
    </script>
</body>
</html>
