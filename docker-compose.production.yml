version: "3.9"

services:
  credivision-app:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: credivision-app
    environment:
      - DATA_FOLDER=/data
      - MEDIA_FOLDER=/media
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - FLASK_ENV=production
    ports:
      - "5000:5000"
    volumes:
      - /home/${USER}/Documents/kiosk-data:/data:rw
      - /home/${USER}/Documents/kiosk-media:/media:rw
    restart: unless-stopped
    networks:
      - credivision-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/config"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  credivision-net:
    driver: bridge
