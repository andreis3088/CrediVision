<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Sistema Kiosk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --teal:  #00AE9D;
      --dark:  #003641;
      --dark2: #00242d;
      --lime:  #C9D200;
      --purple:#49479D;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sora', sans-serif;
      min-height: 100vh;
      display: flex;
      background: var(--dark2);
    }

    /* Left panel */
    .left {
      flex: 1;
      background: linear-gradient(135deg, var(--dark2) 0%, var(--dark) 50%, #00563e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px;
      position: relative;
      overflow: hidden;
    }

    .left::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(0,174,157,.18) 0%, transparent 70%);
      top: -100px; right: -100px;
      border-radius: 50%;
    }

    .left::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(73,71,157,.15) 0%, transparent 70%);
      bottom: -80px; left: -80px;
      border-radius: 50%;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 60px;
      z-index: 1;
    }

    .brand-icon {
      width: 52px; height: 52px;
      background: var(--teal);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }

    .brand-name {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -.02em;
    }

    .brand-sub {
      font-size: 13px;
      color: rgba(255,255,255,.5);
      font-weight: 400;
    }

    .hero-visual {
      width: 280px; height: 160px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      margin-bottom: 36px;
      z-index: 1;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0,0,0,.3);
    }

    .hero-text {
      z-index: 1;
      text-align: center;
    }

    .hero-text h2 {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -.03em;
      margin-bottom: 12px;
    }

    .hero-text p {
      font-size: 14px;
      color: rgba(255,255,255,.5);
      line-height: 1.6;
      max-width: 320px;
    }

    .features {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 40px;
      z-index: 1;
      width: 100%;
      max-width: 340px;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(255,255,255,.05);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.07);
    }

    .feature-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .feature span {
      font-size: 13px;
      color: rgba(255,255,255,.7);
    }

    /* Right panel */
    .right {
      width: 460px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 50px;
      flex-shrink: 0;
    }

    .login-box { width: 100%; }

    .login-title {
      font-size: 26px;
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -.03em;
      margin-bottom: 6px;
    }

    .login-sub {
      font-size: 14px;
      color: #6b8a8a;
      margin-bottom: 36px;
    }

    .form-group { margin-bottom: 20px; }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--dark);
      margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: #aac;
    }

    .form-control {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1.5px solid #e0eaea;
      border-radius: 10px;
      font-family: inherit;
      font-size: 15px;
      color: var(--dark);
      outline: none;
      transition: all .2s;
      background: #f8fafa;
    }

    .form-control:focus {
      border-color: var(--teal);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(0,174,157,.12);
    }

    .alert-error {
      background: #fff0f0;
      border: 1px solid #fcc;
      color: #8b1212;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      margin-top: 8px;
      letter-spacing: .01em;
    }

    .btn-login:hover {
      background: #008f81;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,174,157,.35);
    }

    .login-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: #aab;
    }

    @media (max-width: 768px) {
      .left { display: none; }
      .right { width: 100%; padding: 40px 24px; }
    }
  </style>
</head>
<body>

<div class="left">
  <div class="brand">
    <!-- <div class="brand-icon">🖥️</div> -->
    <div>
      <div class="brand-name">CrediVision</div>
      <div class="brand-sub">Sistema de Exibição de conteudo - UAD</div>
    </div>
  </div>

  <!-- <div class="hero-visual"></div> -->

  <!--<div class="hero-text">
    <h2>Gerenciamento Remoto</h2>
    <p>Controle o que é exibido na sua TV em tempo real, de qualquer dispositivo na rede.</p>
  </div>-->

  <!--div class="features">
    <div class="feature">
      <div class="feature-dot" style="background:#00AE9D"></div>
      <span>Alternância automática de conteúdo</span>
    </div>
    <div class="feature">
      <div class="feature-dot" style="background:#C9D200"></div>
      <span>Interface administrativa responsiva</span>
    </div>
    <div class="feature">
      <div class="feature-dot" style="background:#49479D"></div>
      <span>Multi-usuário com níveis de acesso</span>
    </div>
    <div class="feature">
      <div class="feature-dot" style="background:#7DB61C"></div>
      <span>Logs completos de auditoria</span>
    </div>
  </div>
</div -->

<div class="right">
  <div class="login-box">
    <div class="login-title">Bem-vindo(a)</div>
    <div class="login-sub">Entre com suas credenciais para continuar</div>

    {% for category, message in get_flashed_messages(with_categories=True) %}
    <div class="alert-error">{{ message }}</div>
    {% endfor %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label class="form-label">Usuário</label>
        <div class="input-wrap">
          <!-- <span class="input-icon"></span> -->
          <input type="text" name="username" class="form-control" placeholder="Digite seu usuário" required autocomplete="username"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Senha</label>
        <div class="input-wrap">
          <!-- <span class="input-icon">🔑</span> -->
          <input type="password" name="password" class="form-control" placeholder="Digite sua senha" required autocomplete="current-password"/>
        </div>
      </div>

      <button type="submit" class="btn-login">Entrar no Sistema →</button>
    </form>

    <div class="login-footer">
      Sistema Kiosk · Acesso restrito à rede local
    </div>
  </div>
</div>

</body>
</html>
