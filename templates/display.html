<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kiosk Display</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    
    .kiosk-container {
      text-align: center;
      max-width: 800px;
      padding: 40px;
    }
    
    .kiosk-logo {
      font-size: 4rem;
      margin-bottom: 2rem;
      animation: pulse 2s infinite;
    }
    
    .kiosk-title {
      font-size: 3rem;
      font-weight: 300;
      margin-bottom: 1rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    
    .kiosk-subtitle {
      font-size: 1.5rem;
      font-weight: 300;
      opacity: 0.9;
      margin-bottom: 3rem;
    }
    
    .kiosk-status {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 3rem;
    }
    
    .status-item {
      background: rgba(255,255,255,0.1);
      padding: 20px 30px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    .status-value {
      font-size: 2.5rem;
      font-weight: bold;
      margin-bottom: 0.5rem;
    }
    
    .status-label {
      font-size: 1rem;
      opacity: 0.8;
    }
    
    .kiosk-info {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      margin-bottom: 2rem;
    }
    
    .kiosk-time {
      font-size: 1.2rem;
      opacity: 0.8;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    .loading-dots {
      display: inline-block;
    }
    
    .loading-dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    
    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }
  </style>
</head>
<body>
  <div class="kiosk-container">
    <!--<div class="kiosk-logo">📺</div>-->
    
    <h1 class="kiosk-title">CrediVision</h1>
    <p class="kiosk-subtitle">Sistema de Exibição Automatizada</p>
    
    <div class="kiosk-status">
      <div class="status-item">
        <div class="status-value" id="activeTabs">-</div>
        <div class="status-label">Abas Ativas</div>
      </div>
      <div class="status-item">
        <div class="status-value" id="currentTab">-</div>
        <div class="status-label">Aba Atual</div>
      </div>
      <div class="status-item">
        <div class="status-value" id="uptime">-</div>
        <div class="status-label">Tempo Online</div>
      </div>
    </div>
    
    <div class="kiosk-info">
      <p><strong>Status:</strong> <span class="loading-dots">Carregando configuração</span></p>
      <div id="contentDisplay" style="margin: 20px 0; min-height: 400px; display: flex; align-items: center; justify-content: center;">
        <!-- Content will be displayed here -->
      </div>
      <p class="kiosk-time" id="currentTime"></p>
    </div>
  </div>

  <script>
    // Update current time
    function updateTime() {
      const now = new Date();
      document.getElementById('currentTime').textContent = 
        now.toLocaleString('pt-BR', { 
          weekday: 'long', 
          year: 'numeric', 
          month: 'long', 
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit'
        });
    }
    
    <!-- Fetch kiosk status and content -->
    async function fetchStatus() {
      try {
        const response = await fetch('/api/config');
        const data = await response.json();
        
        document.getElementById('activeTabs').textContent = data.tabs.length;
        
        if (data.tabs.length > 0) {
          document.querySelector('.kiosk-info p').innerHTML = 
            '<strong>Status: </strong>Sistema operacional';
        } else {
          document.querySelector('.kiosk-info p').innerHTML = 
            '<strong>Status: </strong>Nenhuma aba configurada';
        }
        
        // Display content based on type
        let tabIndex = 0;
        function displayContent() {
          if (data.tabs.length === 0) return;
          
          const tab = data.tabs[tabIndex % data.tabs.length];
          const contentDiv = document.getElementById('contentDisplay');
          
          if (tab.content_type === 'image') {
            contentDiv.innerHTML = `<img src="${tab.url}" style="max-width:100%; max-height:60vh; object-fit:contain;" alt="${tab.name}">`;
          } else if (tab.content_type === 'video') {
            contentDiv.innerHTML = `<video src="${tab.url}" style="max-width:100%; max-height:60vh;" controls autoplay muted></video>`;
          } else {
            // URL - show iframe or link preview
            contentDiv.innerHTML = `
              <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; backdrop-filter: blur(10px);">
                <h3 style="margin-bottom: 15px;">${tab.name}</h3>
                <p style="opacity: 0.8;">Carregando conteúdo...</p>
                <iframe src="${tab.url}" style="width:100%; height:400px; border:none; border-radius:10px; background:white;"></iframe>
              </div>
            `;
          }
          
          document.getElementById('currentTab').textContent = 
            tab.name.length > 12 ? tab.name.substring(0, 12) + '...' : tab.name;
          
          tabIndex++;
        }
        
        // Initial display
        displayContent();
        
        // Rotate content
        setInterval(() => {
          if (data.tabs.length > 0) {
            const currentTab = data.tabs[(tabIndex - 1) % data.tabs.length];
            displayContent();
          }
        }, data.tabs.length > 0 ? data.tabs[0].duration * 1000 : 5000);
        
      } catch (error) {
        document.querySelector('.kiosk-info p').innerHTML = 
          '<strong>Status: </strong>Erro de conexão';
      }
    }
    
    // Calculate uptime
    function updateUptime() {
      const startTime = new Date();
      setInterval(() => {
        const now = new Date();
        const diff = Math.floor((now - startTime) / 1000);
        const hours = Math.floor(diff / 3600);
        const minutes = Math.floor((diff % 3600) / 60);
        const seconds = diff % 60;
        
        document.getElementById('uptime').textContent = 
          `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      }, 1000);
    }
    
    // Initialize
    updateTime();
    setInterval(updateTime, 1000);
    fetchStatus();
    setInterval(fetchStatus, 30000); // Refresh every 30 seconds
    updateUptime();
  </script>
</body>
</html>
