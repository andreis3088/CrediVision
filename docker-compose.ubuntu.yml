version: "3.9"

services:
  # Servidor Admin
  credvision-admin:
    build:
      context: .
      dockerfile: Dockerfile.ubuntu
    container_name: credvision-admin
    environment:
      KIOSK_MODE: admin-only
      SECRET_KEY: ${SECRET_KEY:-troque-esta-chave-secreta-em-producao}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      DB_PATH: /data/kiosk.db
      MEDIA_FOLDER: /media
      ADMIN_URL: http://localhost:5000
      CONFIG_REFRESH: 300
    ports:
      - "5000:5000"
    volumes:
      - credvision-data:/data
      - ~/Documentos/kiosk-media:/media:rw
      - /tmp/.X11-unix:/tmp/.X11-unix
    restart: unless-stopped
    networks:
      - credvision-net

  # Firefox Kiosk (opcional - para display na mesma máquina)
  credvision-display:
    build:
      context: .
      dockerfile: Dockerfile.ubuntu
    container_name: credvision-display
    environment:
      KIOSK_MODE: display-only
      ADMIN_URL: http://credvision-admin:5000
      DISPLAY: :0
      MEDIA_FOLDER: /media
      CONFIG_REFRESH: 300
    volumes:
      - credvision-data:/data
      - ~/Documentos/kiosk-media:/media:rw
      - /tmp/.X11-unix:/tmp/.X11-unix
    depends_on:
      - credvision-admin
    restart: unless-stopped
    networks:
      - credvision-net
    profiles:
      - display

volumes:
  credvision-data:
    driver: local

networks:
  credvision-net:
    driver: bridge
